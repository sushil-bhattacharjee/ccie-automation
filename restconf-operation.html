@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#242424;--text:#e8e6df;--text2:#a0a0a0;--text3:#707070;--border:#333;--hover:#2a2a2a;--sel:#2d2854;--sel-border:#7c6cef;--correct:#0a3d2e;--correct-border:#1d9e75;--correct-text:#9fe1cb;--wrong:#3d1515;--wrong-border:#e24b4a;--wrong-text:#f7c1c1;--missed:#0a3d2e;--blue:#0a2a4a;--blue-text:#85b7eb;--purple:#2d2854;--purple-text:#b0a4f0;--code-bg:#2c2c2a;--tree-hl:#3d3510;--tree-hl-text:#f0d861}}

.radio{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}

<body>
<div class="exam">
<div class="exam-header">
<div class="exam-title">IOS-XE ACL CRUD operations</div>

<script>
const H="192.168.89.71",U="expert",P="1234QWer!",B=`https://${H}/restconf/data/Cisco-IOS-XE-native:native`;
const Q=[
// ══════════════════════════════════════════════════════════
// Q1 — POST create new standard ACL
// ══════════════════════════════════════════════════════════
{q:"You want to CREATE a new standard ACL 'TEST-ACL' using POST. Which curl is correct?",
s:"Method: POST\nTarget: create standard=TEST-ACL",
t:`Cisco-IOS-XE-native:native
└── ip
    └── access-list
        └── standard=TEST-ACL
            ├── name
            └── access-list-seq-rule`,
m:false,
opts:[
{l:"",c:`curl -sk -X POST "${B}/ip/access-list/standard=TEST-ACL" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"name":"TEST-ACL"}'`},
{l:"",c:`curl -sk -X POST "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{
    "Cisco-IOS-XE-native:standard": [
      {"name": "TEST-ACL"}
    ]
  }'`},
{l:"",c:`curl -sk -X POST "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"name":"TEST-ACL"}'`},
{l:"",c:`curl -sk -X POST "${B}" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{
    "ip": {
      "access-list": {
        "standard": [{"name":"TEST-ACL"}]
      }
    }
  }'`}
],ans:[1],exp:`<strong>POST = "Create a new child under this parent"</strong><span class="exp-tree">/native/ip/access-list/standard=TEST-ACL\n   ↑    ↑       ↑            ↑\n root folder folder       THE FILE\n                ↑\n        POST URI here (parent)</span>URI → PARENT (one level up). Payload MUST wrap with child YANG list name (module-qualified: <code>Cisco-IOS-XE-native:standard</code>). A targets the object itself — POST can't. C has no wrapper — server doesn't know what to create. D targets native — POST must go to the <em>direct</em> parent, not an ancestor (that's PATCH territory).`},

// ══════════════════════════════════════════════════════════
// Q2 — PUT replace e2-restconf-15
// ══════════════════════════════════════════════════════════
{q:"You want to REPLACE e2-restconf-15 entirely using PUT. Which payload is correct?",
s:"Method: PUT\nURI: .../ip/access-list/standard=e2-restconf-15",
t:`Cisco-IOS-XE-native:native
└── ip
    └── access-list
        └── standard=e2-restconf-15
            ├── name
            └── access-list-seq-rule`,
m:false,
opts:[
{l:"",c:`curl -sk -X PUT "${B}/ip/access-list/standard=e2-restconf-15" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"standard":[{"name":"e2-restconf-15","access-list-seq-rule":[]}]}'`},
{l:"",c:`curl -sk -X PUT "${B}/ip/access-list/standard=e2-restconf-15" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{
    "name": "e2-restconf-15",
    "access-list-seq-rule": [
      {"sequence":"15","permit":{"std-ace":{"host":"10.10.10.15"}}}
    ]
  }'`},
{l:"",c:`curl -sk -X PUT "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"standard":[{"name":"e2-restconf-15","access-list-seq-rule":[]}]}'`},
{l:"",c:`curl -sk -X PUT "${B}/ip/access-list/standard=e2-restconf-15" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"access-list":{"standard":[{"name":"e2-restconf-15"}]}}'`}
],ans:[1],exp:`<strong>PUT = "Place this thing exactly here"</strong><span class="exp-tree">/native/ip/access-list/standard=e2-restconf-15\n                              ↑\n                     PUT URI here (target)\n                     payload = just attributes</span>URI → THE OBJECT itself. Payload = just the entry's attributes, NO wrapping. A double-wraps (<code>/standard/standard</code>). C targets parent — would replace ALL standard ACLs. D wraps with access-list which the URI already covers.`},

// ══════════════════════════════════════════════════════════
// Q3 — PATCH ACE on extended ACL
// ══════════════════════════════════════════════════════════
{q:"You PATCH sequence 10 of extended ACL challenge-207-pod-10 to change action to deny. Which curl succeeds?",
s:"Method: PATCH to specific ACE\nURI: .../extended=challenge-207-pod-10/access-list-seq-rule=10",
t:`Cisco-IOS-XE-native:native
└── ip
    └── access-list
        └── extended=challenge-207-pod-10
            └── access-list-seq-rule=10
                ├── sequence
                └── ace-rule
                    ├── action
                    └── protocol`,
m:false,
opts:[
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list/extended=challenge-207-pod-10/access-list-seq-rule=10" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{
    "sequence": "10",
    "ace-rule": {
      "action": "deny",
      "protocol": "tcp"
    }
  }'`},
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list/extended=challenge-207-pod-10/access-list-seq-rule=10" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"access-list-seq-rule":[{"sequence":"10","ace-rule":{"action":"deny"}}]}'`},
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list/extended=challenge-207-pod-10/access-list-seq-rule=10" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"extended":[{"name":"challenge-207-pod-10","access-list-seq-rule":[{"sequence":"10"}]}]}'`},
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list/extended=challenge-207-pod-10/access-list-seq-rule/10" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{"sequence":"10","ace-rule":{"action":"deny"}}'`}
],ans:[0],exp:`<strong>PATCH to target = bare attributes.</strong> B wraps access-list-seq-rule → double path (<code>.../access-list-seq-rule/access-list-seq-rule</code>). C wraps two extra levels. D uses <code>/10</code> as a path segment instead of the RFC 8040 list-key syntax <code>=10</code> → 404. The list key goes <em>after</em> <code>=</code>, never as a separate path segment.`},

// ══════════════════════════════════════════════════════════
// Q4 — Multi-resource in ONE request
// ══════════════════════════════════════════════════════════
{q:"Which can CREATE a new standard ACL 'NEW-ACL' AND modify seq 35 of e2-restconf-15 in ONE request? (select correct answers)",
s:"Goal: single request for both new ACL creation + existing ACL modification\nNEW-ACL doesn't exist. e2-restconf-15 exists.",
t:`Cisco-IOS-XE-native:native
└── ip
    └── access-list
        ├── standard=NEW-ACL           ← create this
        └── standard=e2-restconf-15    ← modify seq 35 here`,
m:true,
opts:[
{l:"",c:`curl -sk -X POST "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{
    "Cisco-IOS-XE-native:standard": [
      {"name": "NEW-ACL", "access-list-seq-rule":[{"sequence":"10","permit":{"std-ace":{"any":[null]}}}]},
      {"name": "e2-restconf-15", "access-list-seq-rule":[{"sequence":"35","permit":{"std-ace":{"host":"100.35.35.35"}}}]}
    ]
  }'`},
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{
    "Cisco-IOS-XE-native:standard": [
      {"name": "NEW-ACL", "access-list-seq-rule":[{"sequence":"10","permit":{"std-ace":{"any":[null]}}}]},
      {"name": "e2-restconf-15", "access-list-seq-rule":[{"sequence":"35","permit":{"std-ace":{"host":"100.35.35.35"}}}]}
    ]
  }'`},
{l:"",c:`curl -sk -X PUT "${B}/ip/access-list" -H 'content-type: application/yang-data+json' -u ${U}:'${P}' -d '{...same...}'`},
{l:"",c:`curl -sk -X PATCH "${B}" \\
  -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' \\
  -d '{
    "ip":{"access-list":{"standard":[
      {"name":"NEW-ACL","access-list-seq-rule":[{"sequence":"10","permit":{"std-ace":{"any":[null]}}}]},
      {"name":"e2-restconf-15","access-list-seq-rule":[{"sequence":"35","permit":{"std-ace":{"host":"100.35.35.35"}}}]}
    ]}}
  }'`},
{l:"",c:`# Request 1\ncurl -sk -X POST "${B}/ip/access-list" ... (create NEW-ACL)\n# Request 2\ncurl -sk -X PATCH "${B}/ip/access-list/standard=e2-restconf-15" ... (modify seq 35)`},
{l:"Not possible in any single request",c:""}
],ans:[1,3],exp:`<strong>PATCH at the common ancestor works.</strong> POST fails because e2-restconf-15 already exists → 409. PUT to access-list would REPLACE all standard ACLs, wiping SNMP-ACL entirely. <em>Both B (PATCH to access-list) and D (PATCH to native)</em> work — PATCH merges at any level. E works but is two requests, not one.`},

// ══════════════════════════════════════════════════════════
// Q5 — Update only seq 35 safely
// ══════════════════════════════════════════════════════════
{q:"e2-restconf-15 has seq 15, 35, 45. Which safely change ONLY seq 35 without touching 15 and 45? (select correct answers)",
s:"Existing ACEs: seq 15 permit 10.10.10.15, seq 35 permit 5.35.35.35, seq 45 permit any\nGoal: change seq 35 to permit 100.35.35.35, keep 15 and 45.",
t:`Cisco-IOS-XE-native:native
└── ip
    └── access-list
        └── standard=e2-restconf-15
            ├── sequence=15    ← keep
            ├── sequence=35    ← change to 100.35.35.35
            └── sequence=45    ← keep`,
m:true,
opts:[
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list/standard=e2-restconf-15/access-list-seq-rule=35" \\
  -H 'content-type: application/yang-data+json' -u ${U}:'${P}' \\
  -d '{"sequence":"35","permit":{"std-ace":{"host":"100.35.35.35"}}}'`},
{l:"",c:`curl -sk -X PUT "${B}/ip/access-list/standard=e2-restconf-15/access-list-seq-rule=35" \\
  -H 'content-type: application/yang-data+json' -u ${U}:'${P}' \\
  -d '{"sequence":"35","permit":{"std-ace":{"host":"100.35.35.35"}}}'`},
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list/standard=e2-restconf-15" \\
  -H 'content-type: application/yang-data+json' -u ${U}:'${P}' \\
  -d '{"name":"e2-restconf-15","access-list-seq-rule":[{"sequence":"35","permit":{"std-ace":{"host":"100.35.35.35"}}}]}'`},
{l:"",c:`curl -sk -X PUT "${B}/ip/access-list/standard=e2-restconf-15" \\
  -H 'content-type: application/yang-data+json' -u ${U}:'${P}' \\
  -d '{"name":"e2-restconf-15","access-list-seq-rule":[{"sequence":"35","permit":{"std-ace":{"host":"100.35.35.35"}}}]}'`}
],ans:[0,1,2],exp:`<strong>A, B, C — each leaves seq 15 and 45 intact.</strong> A (PATCH to ACE) and B (PUT to ACE) target only sequence=35, so other ACEs are untouched. C (PATCH to parent) merges — unmentioned list entries are preserved. D (PUT to parent) <em>replaces the entire ACL</em> — seq 15 and 45 get wiped because they're not in the body. This is the #1 trap: PUT replaces, PATCH merges, and the URI scope decides what gets replaced.`},

// ══════════════════════════════════════════════════════════
// Q6 — DELETE two ACLs
// ══════════════════════════════════════════════════════════
{q:"DELETE e2-restconf-15 AND exam2-netconf-create-16. Minimum curl requests needed?",
s:"Goal: remove both ACLs completely\ne2-restconf-15 is standard, exam2-netconf-create-16 is extended",
t:`Cisco-IOS-XE-native:native
└── ip
    └── access-list
        ├── standard=e2-restconf-15
        └── extended=exam2-netconf-create-16`,
m:false,
opts:[
{l:"",c:`curl -sk -X DELETE "${B}" -u ${U}:'${P}'`},
{l:"",c:`# Request 1\ncurl -sk -X DELETE "${B}/ip/access-list/standard=e2-restconf-15" -u ${U}:'${P}'\n\n# Request 2\ncurl -sk -X DELETE "${B}/ip/access-list/extended=exam2-netconf-create-16" -u ${U}:'${P}'`},
{l:"",c:`curl -sk -X DELETE "${B}" -u ${U}:'${P}' \\
  -d '{"ip":{"access-list":{...}}}'`},
{l:"",c:`curl -sk -X PATCH "${B}/ip/access-list" -H 'content-type: application/yang-data+json' \\
  -u ${U}:'${P}' -d '{"standard":[{"name":"e2-restconf-15"}],"extended":[{"name":"exam2-netconf-create-16"}]}'`},
{l:"",c:`curl -sk -X DELETE "${B}/ip/access-list" -u ${U}:'${P}'`}
],ans:[1],exp:`<strong>DELETE = no payload, URI = what gets deleted.</strong> A deletes the ENTIRE native tree (catastrophic). C is invalid — DELETE doesn't accept a body. D is a PATCH merge and doesn't remove anything (to remove via PATCH you'd need YANG-Patch with operation "delete"). E deletes <em>all</em> ACLs including SNMP-ACL and challenge-207-pod-10. Two separate targeted DELETEs is the safe answer.`},

// ══════════════════════════════════════════════════════════
// Q7 — PATCH creates non-existent
// ══════════════════════════════════════════════════════════
{q:"PATCH creates a new standard ACL 'NEW-ACL' even though it doesn't exist. Why no 404?",
s:"NEW-ACL does NOT exist.\nPATCH returns 204 No Content (success).",
t:`Cisco-IOS-XE-native:native
└── ip
    └── access-list
        └── standard=NEW-ACL   ← does NOT exist
            ├── name
            └── access-list-seq-rule`,
m:false,
opts:[
{l:"Bug — PATCH shouldn't create. Use POST instead",c:`curl -sk -X POST "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' -u ${U}:'${P}' \\
  -d '{"Cisco-IOS-XE-native:standard":[{"name":"NEW-ACL"}]}'`},
{l:"RFC 8040: RESTCONF PATCH = NETCONF merge (creates if missing, updates if exists)",c:`curl -sk -X PATCH "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' -u ${U}:'${P}' \\
  -d '{"Cisco-IOS-XE-native:standard":[{"name":"NEW-ACL"}]}'`},
{l:"Works because wrapping with standard acts like POST",c:`curl -sk -X PATCH "${B}/ip/access-list" \\
  -H 'content-type: application/yang-data+json' -u ${U}:'${P}' \\
  -d '{"Cisco-IOS-XE-native:standard":[{"name":"NEW-ACL"}]}'`},

],ans:[1],exp:`<strong>RFC 8040: RESTCONF PATCH = NETCONF edit-config with merge operation.</strong> Merge creates missing resources AND updates existing ones. Not a bug (A). Not the same as POST (C/F) — POST returns 409 if resource exists; PATCH doesn't. Not "auto-container creation" (D) — it's the merge semantic. No silent conversion to PUT (E); PUT and PATCH behave differently (PUT replaces, PATCH merges).`},

let score=0,answered=0;
const total=Q.length;
const ctn=document.getElementById('qs');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mkCurl(raw,id){if(!raw)return '';return `<div class="curl-wrap"><div class="curl-code" id="${id}">${esc(raw)}</div><button class="copy-btn" onclick="cpCurl('${id}',this)">copy</button></div>`;}
window.cpCurl=function(id,btn){const el=document.getElementById(id);navigator.clipboard.writeText(el.textContent).then(()=>{btn.textContent='copied!';setTimeout(()=>{btn.textContent='copy';},1500);});};
function upd(){document.getElementById('sc').textContent=score;document.getElementById('prog').textContent=answered+' of '+total+' answered';document.getElementById('pb').style.width=(answered/total*100)+'%';}
Q.forEach((q,qi)=>{
const card=document.createElement('div');card.className='q-card';
const tag=q.m?'<span class="q-tag tag-multi">select '+q.ans.length+'</span>':'<span class="q-tag tag-single">single answer</span>';
const rType=q.m?'checkbox':'';
let oh=q.opts.map((o,oi)=>{const cid='q'+qi+'c'+oi;return `<div class="option" data-q="${qi}" data-o="${oi}"><div class="radio ${rType}"></div><div class="opt-content"><div class="opt-label">${esc(o.l)}</div>${mkCurl(o.c,cid)}</div></div>`;}).join('');
card.innerHTML=`<div class="q-top"><span class="q-num">Question ${qi+1} of ${total}</span>${tag}</div><div class="q-text">${q.q}</div><div class="q-scenario">${esc(q.s)}</div><div class="yang-label">YANG tree</div><div class="yang-tree">${q.t}</div><div class="options" id="opts-${qi}">${oh}</div><div class="actions" id="act-${qi}"><button class="btn btn-submit" id="sub-${qi}" onclick="submitQ(${qi})">Submit</button></div><div class="explanation" id="exp-${qi}">${q.exp}</div>`;
ctn.appendChild(card);
});
document.querySelectorAll('.option').forEach(el=>{el.addEventListener('click',function(){const qi=parseInt(this.dataset.q);const p=document.getElementById('opts-'+qi);if(p.classList.contains('done'))return;if(Q[qi].m){this.classList.toggle('selected');}else{p.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));this.classList.add('selected');}});});
window.submitQ=function(qi){const p=document.getElementById('opts-'+qi);if(p.classList.contains('done'))return;const allO=p.querySelectorAll('.option');const sel=[];allO.forEach((o,i)=>{if(o.classList.contains('selected'))sel.push(i);});if(sel.length===0)return;p.classList.add('done');allO.forEach(o=>{o.classList.remove('selected');o.classList.add('locked');});const cor=Q[qi].ans;let perfect=true;if(Q[qi].m){sel.forEach(s=>{if(cor.includes(s))allO[s].classList.add('correct');else{allO[s].classList.add('wrong');perfect=false;}});cor.forEach(c=>{if(!sel.includes(c)){allO[c].classList.add('missed');perfect=false;}});}else{if(cor.includes(sel[0])){allO[sel[0]].classList.add('correct');}else{allO[sel[0]].classList.add('wrong');allO[cor[0]].classList.add('correct');perfect=false;}}if(perfect)score++;answered++;upd();document.getElementById('sub-'+qi).disabled=true;document.getElementById('sub-'+qi).textContent=perfect?'Correct ✓':'Incorrect ✗';document.getElementById('sub-'+qi).style.background=perfect?'var(--correct-border)':'var(--wrong-border)';document.getElementById('exp-'+qi).style.display='block';};
